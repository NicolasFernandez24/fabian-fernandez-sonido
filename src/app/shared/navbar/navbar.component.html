<nav
  class="fixed top-0 left-0 w-full z-50
         bg-black/80
         backdrop-blur-xl
         border-b border-yellow-500/10">

  <div
    class="max-w-7xl mx-auto
           px-4 md:px-6
           h-20
           flex items-center justify-between">

    <!-- LOGO -->

    <a
      href="#inicio"
      class="flex items-center gap-3">

      <img
        src="assets/logo.png"
        alt="Fabián Fernández Sonido"
        class="h-10 md:h-12 w-auto">

      <div>

        <h2
          class="text-white
                 font-bold
                 text-sm md:text-lg
                 leading-none">

          Fabián Fernández

        </h2>

        <span
          class="text-yellow-400
                 text-[10px] md:text-xs
                 uppercase
                 tracking-[4px]">

          Sonido Profesional

        </span>

      </div>

    </a>

    <!-- DESKTOP -->

    <div
      class="hidden md:flex
             items-center
             gap-10">

      <a
        href="#inicio"
        class="text-neutral-300
               hover:text-yellow-400
               transition">

        Inicio

      </a>

      <a
        href="#servicios"
        class="text-neutral-300
               hover:text-yellow-400
               transition">

        Servicios

      </a>

      <a
        href="#galeria"
        class="text-neutral-300
               hover:text-yellow-400
               transition">

        Galería

      </a>

      <a
        href="#contacto"
        class="text-neutral-300
               hover:text-yellow-400
               transition">

        Contacto

      </a>

    </div>

    <!-- MENU MOBILE -->

    <button
      (click)="menuOpen = !menuOpen"
      class="md:hidden
             text-white
             text-3xl">

      {{ menuOpen ? '✕' : '☰' }}

    </button>

  </div>

  <!-- MOBILE -->

  <div
    *ngIf="menuOpen"
    class="md:hidden
           bg-black
           border-t border-yellow-500/10">

    <div
      class="flex flex-col py-4">

      <a
        href="#inicio"
        (click)="menuOpen = false"
        class="px-6 py-4
               text-neutral-300
               hover:text-yellow-400">

        Inicio

      </a>

      <a
        href="#servicios"
        (click)="menuOpen = false"
        class="px-6 py-4
               text-neutral-300
               hover:text-yellow-400">

        Servicios

      </a>

      <a
        href="#galeria"
        (click)="menuOpen = false"
        class="px-6 py-4
               text-neutral-300
               hover:text-yellow-400">

        Galería

      </a>

      <a
        href="#contacto"
        (click)="menuOpen = false"
        class="px-6 py-4
               text-neutral-300
               hover:text-yellow-400">

        Contacto

      </a>

    </div>

  </div>

</nav>
